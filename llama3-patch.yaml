apiVersion: apps/v1
kind: Deployment
metadata:
  name: llama3-vllm
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llama3
  template:
    metadata:
      labels:
        app: llama3
    spec:
      containers:
      - name: vllm-inference
        image: vllm/vllm-openai:v0.4.1
        imagePullPolicy: IfNotPresent
        command:
        - python3
        - -m
        - vllm.entrypoints.openai.api_server
        args:
        - --model=casperhansen/llama-3-8b-instruct-awq
        - --quantization=awq
        - --gpu-memory-utilization=0.85
        - --max-model-len=512
        ports:
        - containerPort: 8000
          protocol: TCP
        resources:
          limits:
            memory: 6Gi
            nvidia.com/gpu: "1"
          requests:
            cpu: "2"
            memory: 4Gi
            nvidia.com/gpu: "1"
